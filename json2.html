<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div class="heros">
      <ul>
        <li id="hero1"></li>
        <li id="hero2"></li>
        <li id="hero3"></li>
        <li id="hero4"></li>
        <li id="hero5"></li>
        <li id="hero6"></li>
        <li id="hero7"></li>
        <li id="hero8"></li>
        <li id="hero9"></li>
        <li id="hero10"></li>
      </ul>
    </div>

    <script>
      const jsonUrl =
        "https://prof-jwchi.github.io/kopo-front2026/Json/baseball.json";

      // fetch API 로 JSON 파일 가져오기
      fetch(jsonUrl)
        .then((response) => {
          // 응답을 JSON 으로 변환
          return response.json();
        })
        .then((data) => {
          // 변환된 JSON 객체 사용
          const divLi1 = document.getElementById("hero1");
          const divLi2 = document.getElementById("hero2");
          const divLi3 = document.getElementById("hero3");
          const divLi4 = document.getElementById("hero4");
          const divLi5 = document.getElementById("hero5");
          const divLi6 = document.getElementById("hero6");
          const divLi7 = document.getElementById("hero7");
          const divLi8 = document.getElementById("hero8");
          const divLi9 = document.getElementById("hero9");
          const divLi10 = document.getElementById("hero10");
          divLi1.innerHTML = `<strong>종합순위 1위:</strong> ${data.list[0].name}`;
          divLi2.innerHTML = `<strong>종합순위 2위:</strong> ${data.list[1].name}`;
          divLi3.innerHTML = `<strong>종합순위 3위:</strong> ${data.list[2].name}`;
          divLi4.innerHTML = `<strong>종합순위 4위:</strong> ${data.list[3].name}`;
          divLi5.innerHTML = `<strong>종합순위 5위:</strong> ${data.list[4].name}`;
          divLi6.innerHTML = `<strong>종합순위 6위:</strong> ${data.list[5].name}`;
          divLi7.innerHTML = `<strong>종합순위 7위:</strong> ${data.list[6].name}`;
          divLi8.innerHTML = `<strong>종합순위 8위:</strong> ${data.list[7].name}`;
          divLi9.innerHTML = `<strong>종합순위 9위:</strong> ${data.list[8].name}`;
          divLi10.innerHTML = `<strong>종합순위 10위:</strong> ${data.list[9].name}`;
        })
        .catch((error) => {
          // 오류 처리
          console.error("JSON 파일을 가져오는 데 실패했습니다.", error);
        });
    </script>
  </body>
</html>
