    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      .menu a::after {
        content: "";
        display: block;
        width: 0;
        height: 2px;
        background-color: #4967d8;
        transition: 0.3s;
      }

      .menu a:hover::after {
        width: 100%;
      }
    </style>
  </head>
