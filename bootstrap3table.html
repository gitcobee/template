<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!--bootstrp 디자이너 set, cdn방식으로 사용하는 즉시 css와js파일 들고옴, class만 적용하면됨-->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!--bootstrap cdn 방식으로는 css적용 안됨, html에 인라인으로 적용-->
  </head>
  <body>
    <table class="table">
      <thead>
        <tr class="table table-warning">
          <th>번호</th>
          <th class="text-primary">이름</th>
        </tr>
      </thead>

      <tr>
        <td>1</td>
        <td>홍길동</td>
      </tr>
      <tr>
        <td>2</td>
        <td>김철수</td>
      </tr>
      <tr>
        <td>3</td>
        <td>이영희</td>
      </tr>
      <tr>
        <td>4</td>
        <td>박지민</td>
      </tr>
      <tr>
        <td>5</td>
        <td>정우성</td>
      </tr>
      <tr>
        <td>6</td>
        <td>최민수</td>
      </tr>
    </table>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
