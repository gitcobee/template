<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <!--구글 폰트 link-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Gamja+Flower&display=swap"
      rel="stylesheet"
    />
    <style>
      /*구글폰트 css*/
      .gamja-flower-regular {
        font-family: "Gamja Flower", sans-serif;
        font-weight: 400;
        font-style: normal;
      }
      /*눈누 폰트*/
      @font-face {
        font-family: "ChangwonDanggamAsak";
        src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2108@1.1/CWDangamAsac-Bold.woff")
          format("woff");
        font-weight: normal;
        font-display: swap;
      }
      /p만 눈누 폰트 적용/ p {
        font-family: "ChangwonDanggamAsak";
      }
    </style>
  </head>
  <body>
    <h1 class="gamja-flower-regular">방학</h1>
    <h3 class="gamja-flower-regular">지은이 jy</h3>
    <p>여름 방학이 없다.</p>
  </body>
</html>
