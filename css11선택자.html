<!doctype html>
<html lang="en">
  <head>
    <style>
      input[type="text"] {
        background: red;
      }

      input[type="password"] {
        background: blue;
      }

      input[type="button"] {
        border: 0;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <input type="text" />
    <!-- 빨간색 배경 -->
    <input type="password" />
    <!-- 파란색 배경 -->
    <input type="button" value="클릭" />
    <!-- 테두리 없고 마우스 포인터 -->
  </body>
</html>
